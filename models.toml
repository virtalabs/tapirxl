[provider]
name     = "ollama"
endpoint = "http://localhost:11434"

[lm]
model          = "ollama_chat/deepseek-r1:14b"
context_window = 8192
max_tokens     = 1024
temperature    = 0.2

[sub_lm]
model          = "ollama_chat/qwen2.5-coder:3b"
context_window = 32768
max_tokens     = 128
temperature    = 0.0

[sub_lm.fallback]
model          = "ollama_chat/qwen2.5-coder:1.5b"
context_window = 32768
max_tokens     = 128
temperature    = 0.0

[compile]
lm_max_tokens     = 2000
sub_lm_max_tokens = 128
