# TapirXL CI — unit + Vector config + Phase 1 integration smoke (A3).
#
# integration-smoke exercises tapirxl:demo-dev against a stub BlueFlow on
# ubuntu-latest (--network=host). Push an annotated tag only after this
# workflow is green on that commit; see release.yml.

name: CI

on:
  push:
    branches:
      - main
      - "feat/**"
      - "chore/**"
  pull_request:

jobs:
  unit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Install tshark
        # Several tests use pyshark, which shells out to `tshark`. Match the
        # demo image (packaging/docker/demo/Dockerfile) which also bakes it in.
        run: sudo apt-get update && sudo apt-get install -y --no-install-recommends tshark

      - run: uv sync --dev

      - run: uv run ruff check src/ tests/

      - run: uv run ruff format --check src/ tests/

      - name: Unit tests (exclude integration)
        run: uv run pytest -m "not integration" --tb=short

  vector:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Vector 0.55.0
        run: |
          # Install Vector directly from the GitHub release .deb. Avoids the
          # Timber.io apt setup script (currently broken on ubuntu-latest:
          # `E: Unable to locate package vector`) and pins to an immutable
          # release artifact rather than a mutable apt index.
          curl -fsSL -o /tmp/vector.deb \
            https://github.com/vectordotdev/vector/releases/download/v0.55.0/vector_0.55.0-1_amd64.deb
          sudo apt-get install -y /tmp/vector.deb
          vector --version

      - uses: extractions/setup-just@v2

      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - run: uv sync --dev

      - run: just vector-validate

      - run: just vector-test

  integration-smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: extractions/setup-just@v2

      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - run: uv sync --dev

      - name: Build tapirxl:demo-dev
        run: just docker-build-demo

      - name: Smoke test + demo image regression
        run: |
          uv run pytest \
            tests/integration/test_phase1_smoke.py \
            tests/regression/test_demo_image.py \
            -v --tb=short

      - name: Install tcpreplay
        run: sudo apt-get update && sudo apt-get install -y --no-install-recommends tcpreplay

      - name: Live-mode smoke (tcpreplay → demo image live → stub BlueFlow)
        run: uv run pytest tests/integration/test_phase1_live_smoke.py -v --tb=short
