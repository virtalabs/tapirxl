# schema_version = 1
# generator: hand-authored from traffic_generation_manifest_reqs.md
# purpose: default signal manifest for the ACMEHOSP synthetic demo PCAP and golden tests
#
# This manifest happens to emit mostly Philips medical-device signals alongside
# supporting Windows/infra hosts.  The manifest format and loader are vendor-neutral;
# edit or replace this file to generate a different scenario without touching any
# Python source code.

[meta]
schema_version = 1
manifest_id    = "acmehosp_demo_v1"
created_at     = 2026-05-21T00:00:00Z

# ── Scenario context ──────────────────────────────────────────────────────────

[scenario]
domain                = "ACMEHOSP"
pcap_base_timestamp   = "2026-05-14T17:00:00Z"
intra_flow_step_s     = 0.00001   # pre-resolved: 10_000 / 1_000_000_000 (REQ-PRE-003)

[scenario.network]
dhcp_server_slug = "dhcp_server"
gateway_slug     = "gateway"
dns_server_ip    = "10.10.20.7"
subnet_mask      = "255.255.255.0"

[scenario.dhcp_lease]
lease_seconds = 86400
t1_seconds    = 43200
t2_seconds    = 75600

# ── Reusable profiles ─────────────────────────────────────────────────────────
# (REQ-MAN-003, REQ-DOC-001)

[profiles.dhcp_medical_embedded]
description    = "Embedded medical-device DHCP client (Eleva-platform PRL, TTL 64)"
option55_prl   = [1, 3, 6, 15, 28, 51, 58, 59]
ip_ttl         = 64

[profiles.dhcp_windows_10]
description    = "Windows 10 / Server 2019 DHCP client profile (MSFT 5.0)"
option60_vci   = "MSFT 5.0"
option55_prl   = [1, 3, 6, 15, 31, 33, 43, 44, 46, 47, 119, 121, 249, 252]
ip_ttl         = 128

[profiles.dhcp_windows_7]
description    = "Windows 7 SP1 DHCP client profile — Fingerbank: 'Windows 7 / Server 2008 R2 DHCP client typical'"
option60_vci   = "MSFT 5.0"
option55_prl   = [1, 15, 3, 6, 44, 46, 47, 31, 33, 121, 249, 43]
ip_ttl         = 128

[profiles.tcp_syn_win7]
description    = "Windows 7 SP1 TCP SYN fingerprint (TTL 128, MSS 1460, WScale 8, SACKPermitted)"
ip_ttl         = 128
mss            = 1460
window         = 8192
wscale         = 8
sack_permitted = true

