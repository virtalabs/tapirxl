# ── Flows ─────────────────────────────────────────────────────────────────────
# Multi-host packet exchanges (hybrid model — solo signals declared above per-asset)
# (REQ-PRE-002: pre-resolved TCP flag values not needed here as they are
#  protocol constants embedded in the emitter code, not signaturable values)

# ── Brilliance iCT → CCPlatform DICOM exchange ───────────────────────────────

[[flows]]
type          = "arp_exchange"
requester     = "brilliance_ict"
responder     = "ccplatform01"
emit_at_s     = 15.0

[[flows]]
type                   = "dicom_associate_and_cstore"
client                 = "brilliance_ict"
server                 = "ccplatform01"
emit_at_s              = 15.0
client_port            = 49152
server_port            = 104
called_ae              = "CCPLATFORM"
calling_ae             = "CT9999999"
client_impl_class_uid  = "1.3.46.670589.30.36.0"
client_impl_version    = "PMS_ELEVA_416"
server_impl_class_uid  = "1.3.46.670589.40.12.2.1"
server_impl_version    = "PMS_ELEVA_CCP12"
abstract_syntax        = "1.2.840.10008.5.1.4.1.1.2"   # CT Image Storage
transfer_syntax        = "1.2.840.10008.1.2.1"          # Explicit VR Little Endian
max_pdu                = 16382
message_id             = 1337
sop_instance_uid       = "1.2.840.113704.1.7.1.0.1234567890.1"
dataset_patient_name   = "SYNTH^POC"
dataset_modality       = "CT"
dataset_manufacturer   = "Philips"
dataset_model          = "Brilliance iCT"
dataset_software_versions = ["4.1.6"]

