# Vector unit tests for the to_asset transform.
#
# Mirrors the 8 records in tests/regression/golden_synthetic_philips_inventory.jsonl.
# Run via: `just vector-test` (which passes both this file and the parent
# upload-vector.toml so the to_asset transform is in scope).
#
# Departure from the literal plan: tests live in this file rather than
# inline in upload-vector.toml, to keep the production config focused.
# Same `vector test` semantics either way.

# Helper sink so `vector test` has something to extract from when the
# main upload-vector.toml's http sink can't be instantiated (missing
# BLUEFLOW_URL env-var). Console here is unused at test time; tests
# operate on the transform output directly.
[sinks.tests_noop]
type   = "blackhole"
inputs = ["to_asset"]
print_interval_secs = 0

## ---- 1: philips / clinical_collaboration_platform / pacs / HIGH (full fields) ----

[[tests]]
name = "record_01_philips_clinical_collaboration_platform_high"

[[tests.inputs]]
insert_at = "to_asset"
type      = "log"
[tests.inputs.log_fields]
hostname     = "CCPLATFORM01"
ip_address   = "10.10.20.20"
mac_address  = "00:09:5C:BB:CC:02"
vendor       = "philips"
product      = "clinical_collaboration_platform"
device_class = "pacs"
open_ports   = [5355]
confidence   = "HIGH"

[[tests.outputs]]
extract_from = "to_asset"
[[tests.outputs.conditions]]
type = "vrl"
source = '''
  assert_eq!(.mac_address, "00:09:5C:BB:CC:02")
  assert_eq!(.ip_address, "10.10.20.20")
  assert_eq!(.hostname, "CCPLATFORM01")
  assert_eq!(.manufacturer, "Philips")
  assert_eq!(.model, "Clinical Collaboration Platform")
  assert_eq!(.category, "pacs")
  assert_eq!(.open_ports_tcp, [5355])
  assert_eq!(.external_keys.tapirxl_confidence, "HIGH")
  assert!(!exists(.vendor),         "source key vendor must be stripped")
  assert!(!exists(.product),        "source key product must be stripped")
  assert!(!exists(.device_class),   "source key device_class must be stripped")
  assert!(!exists(.confidence),     "source key confidence must be stripped")
  assert!(!exists(.app_sw_version), "no version present, key must be absent")
  true
'''

